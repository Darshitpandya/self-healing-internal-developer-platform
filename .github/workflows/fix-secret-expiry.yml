name: "Self-Heal: Fix Secret Expiry"

on:
  repository_dispatch:
    types: [port-fix-secret-expiry]
  workflow_dispatch:
    inputs:
      service_identifier:
        description: "Service identifier"
        required: true
      secret_name:
        description: "Secret name (e.g., PAYMENT_GATEWAY_API_KEY)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v1.4.2/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Run OPA policy tests
        run: opa test policies/

      - name: Determine inputs
        id: inputs
        run: |
          SVC="${{ github.event.client_payload.service_identifier || github.event.inputs.service_identifier }}"
          SECRET="${{ github.event.client_payload.secret_name || github.event.inputs.secret_name }}"
          TIER="${{ github.event.client_payload.service_tier || github.event.inputs.service_tier || 'standard' }}"
          echo "service=$SVC" >> $GITHUB_OUTPUT
          echo "secret=$SECRET" >> $GITHUB_OUTPUT
          echo "tier=$TIER" >> $GITHUB_OUTPUT

          # Load secret data
          DAYS=$(cat sample-data/secrets.json | jq -r --arg svc "$SVC" '.[$svc].secrets[] | select(.name == "'"$SECRET"'") | .days_to_expiry')
          echo "days_to_expiry=${DAYS:-999}" >> $GITHUB_OUTPUT

      - name: OPA policy check
        id: opa
        run: |
          INPUT=$(jq -n \
            --arg action "fix_secret_expiry" \
            --arg tier "${{ steps.inputs.outputs.tier }}" \
            --argjson days ${{ steps.inputs.outputs.days_to_expiry }} \
            '{action: $action, service_tier: $tier, days_to_expiry: $days}')
          RESULT=$(echo "$INPUT" | opa eval -d policies/selfheal.rego -i /dev/stdin "data.selfheal.allow" --format raw)
          if [ -z "$RESULT" ]; then
            echo "OPA returned empty result — policy evaluation failed"
            exit 1
          fi
          echo "allowed=$RESULT" >> $GITHUB_OUTPUT
          echo "OPA decision: $RESULT"

      - name: Create secret rotation PR
        if: steps.opa.outputs.allowed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "self-heal/secret-${{ steps.inputs.outputs.service }}-${{ steps.inputs.outputs.secret }}"
          title: "🔐 Secret rotation: ${{ steps.inputs.outputs.service }} — ${{ steps.inputs.outputs.secret }}"
          body: |
            ## Self-Healing: Secret Expiry Remediation

            **Service:** ${{ steps.inputs.outputs.service }}
            **Secret:** ${{ steps.inputs.outputs.secret }}
            **Days to expiry:** ${{ steps.inputs.outputs.days_to_expiry }}

            ### Recommended remediation
            1. Migrate secret from environment variable to AWS Secrets Manager
            2. Enable auto-rotation with 90-day cycle
            3. Update service config to reference Secrets Manager ARN

            ---
            *Auto-raised by the self-healing platform. Human approval required before merge.*
          commit-message: "chore: rotate secret ${{ steps.inputs.outputs.secret }} for ${{ steps.inputs.outputs.service }}"
